<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>James Skowyra</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/slideshow.css">
</head>
<body>
  <header>
    <h1>James Skowyra Photography</h1>
    <nav>
      <a href="index.html">Work</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main>
    <div class="gallery" id="gallery">
      <div class="gallery-col gallery-col--left">
        <img src="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/jamesskowyra.com/WhiteTeapot.jpg" alt="">
        <img src="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/jamesskowyra.com/ItalianAppetizers.jpg" alt="">
        <img src="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/jamesskowyra.com/Bolex16mm.jpg" alt="">
      </div>
      <div class="gallery-col gallery-col--right">
        <img src="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/jamesskowyra.com/WallHanging.jpg" alt="">
        <img src="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/jamesskowyra.com/ViolinOnPurple.jpg" alt="">
        <img src="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/jamesskowyra.com/BrandyGlassWithStones.jpg" alt="">
      </div>
    </div>
  </main>

  <!-- Slideshow overlay -->
  <div class="slideshow-overlay" id="slideshow" aria-modal="true" role="dialog" aria-label="Photo slideshow" hidden>
    <button class="slideshow-close" id="slideshow-close" aria-label="Close">&#x2715;</button>
    <button class="slideshow-prev" id="slideshow-prev" aria-label="Previous">&#x2190;</button>
    <div class="slideshow-image-wrap">
      <img class="slideshow-image" id="slideshow-image" src="" alt="">
    </div>
    <button class="slideshow-next" id="slideshow-next" aria-label="Next">&#x2192;</button>
  </div>

  <script src="js/slideshow.js"></script>
</body>
</html>
